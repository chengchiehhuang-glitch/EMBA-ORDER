<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="app-version" content="2026-04-08-v3">
<title>EMBA E118 共學團點餐系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f1;--sur:#fff;--bdr:#e5e0d8;--bdr2:#ccc8c0;
  --ink:#1c1917;--ink2:#6b6560;--ink3:#b0aaa3;
  --dark:#1c1917;--dktx:#f5f0e8;
  --dr:#0a5c8a;--drbg:#e6f3fb;--drbdr:#a8d4ee;
  --fo:#8a3a0a;--fobg:#fbede6;--fobdr:#eebda8;
  --gold:#c98a0a;--goldbg:#fef5d6;
  --grn:#15803d;--grnbg:#f0fdf4;
  --r:14px;--r2:10px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#141210;--sur:#1e1b18;--bdr:#2e2a26;--bdr2:#3d3830;
    --ink:#f0ebe3;--ink2:#9b9389;--ink3:#5a5550;
    --dark:#0e0c0a;--dktx:#f5f0e8;
    --dr:#4a9ebe;--drbg:#0d2233;--drbdr:#1e4a66;
    --fo:#d4804a;--fobg:#2a1206;--fobdr:#5c2e10;
    --gold:#e0a020;--goldbg:#2a1f00;
    --grn:#22c55e;--grnbg:#052010;
  }
  .fin{color:var(--ink);background:var(--bg)}
  .btn-out{border-color:var(--bdr2);color:var(--ink2)}
  .pshop-card{background:var(--sur)}
  .order-card{background:var(--sur)}
  .sc{background:var(--sur)}
  .lkbox{background:var(--sur)}
  .paybox{border-color:var(--gold)}
  .addrow input{color:var(--ink);background:var(--bg)}
  .modal-sheet{background:var(--sur)}
  .cf-sheet{background:var(--sur)}
  .cf-pw{background:var(--bg);color:var(--ink);border-color:var(--bdr2)}
  textarea.fin{color:var(--ink)}
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.scr{display:none;flex-direction:column;min-height:100vh}
.scr.on{display:flex}
.tb{background:var(--dark);color:var(--dktx);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.tb-bk{background:none;border:none;color:var(--dktx);font-size:1.1rem;cursor:pointer;opacity:.65;padding:4px 6px;transition:opacity .15s}
.tb-bk:hover{opacity:1}
.tb-t{font-size:.92rem;font-weight:900;flex:1}
.tb-s{font-size:.63rem;color:rgba(245,240,232,.38);font-family:'DM Mono',monospace;margin-top:1px}
.wrap{flex:1;max-width:640px;width:100%;margin:0 auto;padding:18px 15px 100px}

/* HERO */
.hero{text-align:center;padding:28px 0 22px}
.hero-ico{font-size:2.8rem;display:block;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.hero-t{font-size:1.6rem;font-weight:900;letter-spacing:-.02em;margin:9px 0 4px}
.hero-s{font-size:.8rem;color:var(--ink2);line-height:1.65}

/* DATE */
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.wnav-btn{background:none;border:2px solid var(--bdr);border-radius:8px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s}
.wnav-btn:hover{border-color:var(--ink);background:var(--ink);color:#fff}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.dc{border-radius:8px;border:2px solid var(--bdr);background:#ffffff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;gap:1px;transition:all .15s;min-height:50px}
.dc.sat{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border-color:#60a5fa;color:#1e3a8a}
.dc.sun{background:linear-gradient(135deg,#fee2e2 0%,#fecaca 100%);border-color:#f87171;color:#991b1b}
.dc:hover{border-color:var(--ink)}
.dc.sel{background:var(--dark);border-color:var(--dark);color:var(--dktx)}
.dc.has{border-color:var(--gold);background:var(--goldbg)}
.dc.sel.has{background:var(--dark);border-color:var(--dark);color:var(--dktx)}
.dc.sat.sel,.dc.sun.sel{background:var(--dark);border-color:var(--dark);color:var(--dktx)}
.dc .D{font-size:.86rem;font-weight:900;line-height:1}
.dc .W{font-size:.52rem;opacity:.58}
.dc .dots{display:flex;gap:2px;margin-top:2px}
.dc .dot{width:4px;height:4px;border-radius:50%}
.dc .dot.dr{background:var(--dr)}
.dc .dot.fo{background:var(--fo)}
.dc.sel .dot{background:rgba(245,240,232,.6)}

/* LOCK */


/* TYPE CARDS */
.trow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;align-items:start}
.tc{border:2.5px solid var(--bdr);border-radius:var(--r);padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sur)}
.tc:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.08)}
.tc.dr{border-color:var(--drbdr);background:var(--drbg)}
.tc.fo{border-color:var(--fobdr);background:var(--fobg)}
.tc-ico{font-size:2.2rem;display:block;margin-bottom:7px}
.tc-nm{font-size:.98rem;font-weight:900}
.tc-sb{font-size:.69rem;color:var(--ink2);margin-top:2px}
.tc-st{font-size:.67rem;margin-top:6px;font-weight:700}
.tc-st.op{color:var(--grn)}
.tc-st.em{color:var(--gold)}

/* DAY HDR */
.dhdr{background:var(--dark);border-radius:var(--r);padding:13px 17px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;color:var(--dktx)}
.dhdr-d{font-size:1.05rem;font-weight:900;color:#fbbf24}
.dhdr-w{font-size:.67rem;color:rgba(245,240,232,.38);margin-top:2px;font-family:'DM Mono',monospace}

/* SHOP SELECT */
.sect{font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin:14px 0 7px;display:flex;align-items:center;gap:7px}
.sect::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* FUZZY SEARCH */
.fwrap{position:relative;margin-bottom:10px}
.fin{width:100%;border:2px solid var(--bdr);border-radius:var(--r2);padding:11px 13px 11px 35px;font-size:.88rem;outline:none;font-family:'Noto Sans TC',sans-serif;background:var(--sur);transition:border-color .15s}
.fin:focus{border-color:var(--ink)}
.ficon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none}
.fdrop{position:absolute;top:calc(100% - 2px);left:0;right:0;background:var(--sur);border:2px solid var(--ink);border-top:none;border-radius:0 0 var(--r2) var(--r2);z-index:30;max-height:240px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.fdrop.on{display:block}
.fitem{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .1s}
.fitem:last-child{border-bottom:none}
.fitem:hover,.fitem.hi{background:var(--goldbg)}
.fi-nm{font-size:.86rem;font-weight:700}
.fi-ad{font-size:.69rem;color:var(--ink2);margin-top:1px}
.fhi{color:var(--gold);font-weight:900}

/* PRESET GRID */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pc{border:1.5px solid var(--bdr);border-radius:var(--r2);padding:9px 11px;cursor:pointer;background:var(--sur);transition:all .15s;display:flex;align-items:center;gap:7px}
.pc:hover{border-color:var(--gold);background:var(--goldbg);transform:translateY(-1px)}
.pc-ico{font-size:1.1rem;flex-shrink:0}
.pc-nm{font-size:.78rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-ad{font-size:.61rem;color:var(--ink2);margin-top:1px}

/* AI LOADING */
.aibox{background:var(--dark);border-radius:var(--r);padding:16px;margin-bottom:12px;color:var(--dktx)}
.ai-shop{font-size:.96rem;font-weight:900;color:#fbbf24;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ai-steps{display:flex;flex-direction:column;gap:6px}
.aist{display:flex;align-items:center;gap:7px;font-size:.76rem;color:rgba(245,240,232,.55)}
.aist.done{color:#4ade80}
.aist.load{color:#fbbf24}
.aist .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.aist.load .dot{animation:pulse .75s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}

/* MENU LIST */
.mlist{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.mi{background:var(--sur);border:2px solid var(--bdr);border-radius:var(--r2);padding:10px 12px;display:flex;align-items:center;gap:8px}
.mi-info{flex:1;min-width:0}
.mi-nm{font-size:.85rem;font-weight:700}
.mi-cat{font-size:.61rem;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:1px}
.mi-p{font-size:.86rem;font-weight:700;color:#dc2626;font-family:'DM Mono',monospace;white-space:nowrap}
.mi-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:.9rem;padding:3px;transition:color .15s;flex-shrink:0}
.mi-del:hover{color:#dc2626}
.addrow{display:grid;grid-template-columns:1fr 70px 70px auto;gap:5px}
.addrow input{border:2px solid var(--bdr);border-radius:8px;padding:8px 9px;font-size:.79rem;outline:none;background:var(--bg);font-family:'Noto Sans TC',sans-serif;transition:border-color .15s}
.addrow input:focus{border-color:var(--gold)}

/* ORDER */
.ohero{border-radius:var(--r);padding:13px 15px;margin-bottom:13px}
.ohero.dr{background:var(--drbg);border:2px solid var(--drbdr)}
.ohero.fo{background:var(--fobg);border:2px solid var(--fobdr)}
.oh-shop{font-size:1.02rem;font-weight:900}
.oh-host{font-size:.71rem;color:var(--ink2);margin-top:3px}
.oh-cnt{font-size:.66rem;font-family:'DM Mono',monospace;color:var(--ink3);margin-top:2px}
.olist{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.oi{background:var(--sur);border:2px solid var(--bdr);border-radius:var(--r2);padding:10px 12px;display:flex;align-items:center;gap:9px;transition:border-color .15s}
.oi.sel{border-color:var(--gold)}
.oi-info{flex:1}
.oi-nm{font-size:.86rem;font-weight:700}
.oi-cat{font-size:.61rem;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:1px}
.oi-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.oi-p{font-size:.9rem;font-weight:700;color:#dc2626;font-family:'DM Mono',monospace}
.qrow{display:flex;align-items:center;gap:5px}
.qbtn{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr2);background:var(--bg);cursor:pointer;font-size:.88rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--ink)}
.qbtn.p{background:var(--dark);border-color:var(--dark);color:var(--dktx)}
.qbtn.m:hover{background:#dc2626;border-color:#dc2626;color:#fff}
.qnum{font-size:.85rem;font-weight:700;font-family:'DM Mono',monospace;min-width:15px;text-align:center}

/* PAY SETUP */
.ptabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.ptab{border:2px solid var(--bdr);border-radius:var(--r2);padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sur)}
.ptab.sel{border-color:var(--grn);background:var(--grnbg)}
.ptab.full{grid-column:1/-1}
.pt-ico{font-size:1.4rem;display:block;margin-bottom:3px}
.pt-nm{font-size:.78rem;font-weight:700}
.pt-sb{font-size:.64rem;color:var(--ink2);margin-top:1px}
.upzone{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.upzone:hover{border-color:var(--gold);background:var(--goldbg)}
.upzone.has{border-style:solid;border-color:var(--grn);background:var(--grnbg)}
.upzone img{max-width:130px;max-height:130px;border-radius:8px;object-fit:contain}
.upzone-t{font-size:.74rem;color:var(--ink3);margin-top:5px}

/* CONFIRM / DONE */
.sc{background:var(--sur);border:2px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:11px}
.sc-hd{background:var(--dark);color:var(--dktx);padding:9px 14px;font-size:.69rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bdr);font-size:.82rem}
.sc-row:last-child{border-bottom:none}
.sc-q{color:var(--gold);font-family:'DM Mono',monospace;font-weight:700;margin-right:4px}
.sc-p{font-family:'DM Mono',monospace;color:#dc2626;font-weight:700}
.sc-tot{background:var(--bg);padding:11px 14px;display:flex;justify-content:space-between;font-weight:900}
.sc-ta{font-size:1.3rem;font-family:'DM Mono',monospace;color:#dc2626}
.paybox{background:var(--sur);border:2px solid var(--gold);border-radius:var(--r);padding:17px;text-align:center;margin-bottom:11px}
.pb-t{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.pb-a{font-size:1.95rem;font-weight:900;font-family:'DM Mono',monospace;color:#dc2626;margin-bottom:3px}
.pb-s{font-size:.71rem;color:var(--ink3);margin-bottom:13px}
.lp-btn{display:inline-flex;align-items:center;gap:6px;background:#06c755;color:#fff;border-radius:8px;padding:10px 18px;font-size:.86rem;font-weight:700;text-decoration:none;font-family:'Noto Sans TC',sans-serif;transition:background .15s}
.lp-btn:hover{background:#05aa49}
.ip-btn{display:inline-flex;align-items:center;gap:6px;background:#003087;color:#fff;border-radius:8px;padding:10px 18px;font-size:.86rem;font-weight:700;text-decoration:none;font-family:'Noto Sans TC',sans-serif;transition:background .15s}
.ip-btn:hover{background:#002070}
.qrimg{max-width:150px;max-height:150px;border-radius:8px;border:2px solid var(--bdr);margin:0 auto;display:block}
.done-h{text-align:center;padding:26px 0 14px}
.done-ico{font-size:2.8rem;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.done-t{font-size:1.25rem;font-weight:900;margin:9px 0 4px}
.done-s{font-size:.81rem;color:var(--ink2);line-height:1.65}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 17px;border-radius:9px;border:none;font-size:.86rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap}
.btn-dk{background:var(--dark);color:var(--dktx)}
.btn-dk:hover{background:#2d2a26}
.btn-out{background:transparent;color:var(--ink2);border:2px solid var(--bdr2)}
.btn-out:hover{border-color:var(--ink);color:var(--ink)}
.btn-gold{background:var(--gold);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:6px 10px;font-size:.75rem}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* INFO */
.ibox{border-radius:var(--r2);padding:9px 12px;font-size:.74rem;line-height:1.6;display:flex;gap:6px;margin-bottom:9px}
.i-ok{background:var(--grnbg);border:1.5px solid #bbf7d0;color:var(--grn)}
.i-bl{background:var(--drbg);border:1.5px solid var(--drbdr);color:var(--dr)}
.i-wa{background:#fffbeb;border:1.5px solid #fde68a;color:#92400e}

/* FLOAT BAR */
.fbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--sur);border-top:2px solid var(--bdr);padding:10px 15px 18px;display:none}
.fbar.on{display:block}
.fbar-in{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:10px}
.fbar-inf{flex:1}
.fbar-l{font-size:.64rem;color:var(--ink3)}
.fbar-a{font-size:1.2rem;font-weight:900;color:#dc2626;font-family:'DM Mono',monospace}

/* SPINNER */
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--dktx);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* SEL SHOP BOX */
.ssb{background:var(--dark);border-radius:var(--r);padding:13px 15px;margin-bottom:13px;color:var(--dktx);display:flex;align-items:center;gap:11px}
.ssb-ico{font-size:1.5rem}
.ssb-info{flex:1}
.ssb-nm{font-size:.95rem;font-weight:900;color:#fbbf24}
.ssb-ad{font-size:.67rem;color:rgba(245,240,232,.38);margin-top:2px;font-family:'DM Mono',monospace}
.ssb-chg{background:none;border:1px solid rgba(245,240,232,.22);border-radius:6px;color:rgba(245,240,232,.6);font-size:.69rem;padding:4px 8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap}
.ssb-chg:hover{border-color:rgba(245,240,232,.5);color:var(--dktx)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--dark);color:var(--dktx);border-radius:50px;padding:9px 18px;font-size:.78rem;font-weight:700;z-index:200;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}


/* SWEETNESS / ICE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-width:640px;padding:20px 18px 36px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:1rem;font-weight:900;margin-bottom:4px}
.modal-sub{font-size:.75rem;color:var(--ink2);margin-bottom:16px}
.opt-group{margin-bottom:14px}
.opt-group-label{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px}
.opt-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:50px;border:2px solid var(--bdr2);background:var(--bg);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.chip:hover{border-color:var(--ink)}
.chip.sel{background:var(--dark);border-color:var(--dark);color:var(--dktx)}

/* MULTI-ORDER */
.order-person-tab{display:flex;gap:0;overflow-x:auto;margin-bottom:14px;border-bottom:2px solid var(--bdr);scrollbar-width:none}
.order-person-tab::-webkit-scrollbar{display:none}
.opt{flex-shrink:0;padding:8px 14px;cursor:pointer;font-size:.8rem;font-weight:700;border-bottom:3px solid transparent;transition:all .15s;color:var(--ink2);white-space:nowrap;font-family:'Noto Sans TC',sans-serif;background:none;border-top:none;border-left:none;border-right:none}
.opt.active{color:var(--dark);border-bottom-color:var(--dark)}
.opt.has-item{color:var(--grn)}
.opt.has-item.active{border-bottom-color:var(--grn)}
.add-person-btn{flex-shrink:0;padding:8px 12px;cursor:pointer;font-size:.8rem;font-weight:700;color:var(--gold);border:none;background:none;font-family:'Noto Sans TC',sans-serif}

/* EDIT ORDER */
.edit-order-card{background:var(--sur);border:2px solid var(--gold);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px}

/* GROUP DETAIL */
.gd-hero{border-radius:var(--r);padding:15px 17px;margin-bottom:14px}
.gd-hero.dr{background:var(--drbg);border:2px solid var(--drbdr)}
.gd-hero.fo{background:var(--fobg);border:2px solid var(--fobdr)}
.gd-shop{font-size:1.05rem;font-weight:900}
.gd-host{font-size:.75rem;color:var(--ink2);margin-top:3px}
.gd-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.gd-stat{font-size:.72rem;font-family:'DM Mono',monospace}
.gd-stat .v{font-size:1.1rem;font-weight:900;display:block;color:var(--ink)}
.gd-stat .l{color:var(--ink3)}
.order-card{background:var(--sur);border:2px solid var(--bdr);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.oc-name{font-size:.9rem;font-weight:700}
.oc-total{font-size:.9rem;font-weight:700;color:#dc2626;font-family:'DM Mono',monospace}
.oc-items{font-size:.76rem;color:var(--ink2);line-height:1.7}
.oc-paid{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:50px;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-top:6px}
.oc-paid.yes{background:#dcfce7;color:#15803d}
.oc-paid.no{background:#fef9c3;color:#854d0e}
.oc-paid.no:hover{background:#fde047;color:#713f12}
.del-group-btn{display:flex;align-items:center;gap:6px;width:100%;padding:12px;border-radius:9px;border:2px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;justify-content:center;transition:all .15s;margin-top:8px}
.del-group-btn:hover{background:#fee2e2;border-color:#dc2626}
.pay-summary{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:var(--r2);padding:10px 14px;margin-bottom:12px}
.ps-label{font-size:.72rem;color:var(--ink2)}
.ps-val{font-size:.88rem;font-weight:700;font-family:'DM Mono',monospace}

/* MENU UPLOAD */
.upload-menu-box{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:18px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);margin-bottom:10px}
.upload-menu-box:hover{border-color:var(--gold);background:var(--goldbg)}
.upload-menu-box.has{border-style:solid;border-color:var(--grn);background:#f0fdf4}
.upload-menu-box img{max-width:100%;max-height:180px;border-radius:8px;object-fit:contain}
.upload-menu-txt{font-size:.78rem;color:var(--ink3);margin-top:6px}
.ocr-progress{background:var(--dark);border-radius:var(--r2);padding:12px 14px;color:var(--dktx);font-size:.78rem;margin-bottom:10px;display:none}
.ocr-progress.on{display:block}
.ocr-step{display:flex;align-items:center;gap:7px;padding:3px 0}
.ocr-step .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.ocr-step.load{color:#fbbf24}.ocr-step.load .dot{animation:pulse .8s ease-in-out infinite}
.ocr-step.done{color:#4ade80}
.or-divider{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:.72rem;color:var(--ink3)}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* PRESET SHOP CARD */
.pshop-card{background:var(--sur);border:2px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.pshop-card:hover{border-color:var(--gold)}
.pshop-hd{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
.pshop-ico{font-size:1.5rem;flex-shrink:0}
.pshop-info{flex:1}
.pshop-nm{font-size:.9rem;font-weight:900}
.pshop-addr{font-size:.68rem;color:var(--ink2);margin-top:2px}
.pshop-tel{font-size:.68rem;color:var(--dr);margin-top:1px;font-family:'DM Mono',monospace}
.pshop-arrow{font-size:.9rem;color:var(--ink3);transition:transform .2s}
.pshop-card.open .pshop-arrow{transform:rotate(90deg)}
.pshop-body{display:none;border-top:1px solid var(--bdr);padding:10px 14px}
.pshop-card.open .pshop-body{display:block}
.pshop-select{width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:2px solid var(--dark);background:var(--dark);color:var(--dktx);font-size:.84rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.pshop-menu-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:.78rem}
.pshop-menu-item:last-child{border-bottom:none}
.pshop-menu-cat{font-size:.65rem;color:var(--ink3);font-family:'DM Mono',monospace;margin-left:6px}
.pshop-menu-price{font-family:'DM Mono',monospace;color:#dc2626;font-weight:700;flex-shrink:0}

/* CONFIRM / DELETE MODAL */
.cf-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.cf-sheet{background:var(--sur);border-radius:18px;width:100%;max-width:400px;padding:24px 22px 22px;animation:pop .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.cf-title{font-size:1.05rem;font-weight:900;margin-bottom:8px;color:var(--ink)}
.cf-msg{font-size:.81rem;color:var(--ink2);line-height:1.7;margin-bottom:16px}
.cf-pw{width:100%;border:2px solid var(--bdr2);border-radius:10px;padding:14px;font-size:1.2rem;font-family:'DM Mono',monospace;letter-spacing:.25em;outline:none;margin-bottom:14px;background:var(--bg);color:var(--ink);text-align:center;display:block}
.cf-pw:focus{border-color:var(--ink)}
.cf-pw.err{border-color:#dc2626;animation:shake .3s}
.cf-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* PDF PRINT STYLES */
@media print{
  body{background:#fff!important}
  .scr{display:none!important}
  #pdf-print-area{display:block!important}
  .no-print{display:none!important}
  .print-page{page-break-after:always}
  .print-page:last-child{page-break-after:avoid}
}
#pdf-print-area{display:none}

  </div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const PW = '118118';

// 姓名改為手動輸入，不使用名單
// 拍照辨識菜單透過 GAS 後端代理（避免 CORS、避免 Key 外洩）
const GAS_URL = localStorage.getItem('gas_url') || 'https://script.google.com/macros/s/AKfycbxg3iYFufruK5J3qt-kw2yp4GYJyNd5fMf4CrMFX9VeNtMIigHw6uLFhrwT7NHYLXx3JQ/exec';
const WD = ['日','一','二','三','四','五','六'];
const WDF = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

// ══════════════════════════════════════════════════
// 飲料店內建菜單（台南地區價格，可選甜度冰塊）
// ══════════════════════════════════════════════════
const DRINK_LIST = []; // 已停用內建資料，全部從 GAS/Excel 讀取

// ══════════════════════════════════════════════════
// 便當餐廳內建菜單（台南成大附近）
// ══════════════════════════════════════════════════
const FOOD_LIST = []; // 已停用內建資料，全部從 GAS/Excel 讀取

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const S = {
  selDate: null, weekOff: 0,
  type: null,
  shopSel: null,
  aiMenu: [],
  hostName: '',
  payMethod: null, payLink: '', ipassLink: '', payQr: null,
  announcement: '', // 開團公告（選填）
  setupStep: 0,
  persons: [],        // [{name, cart, note}]  多人點餐
  activePerson: 0,
  curGroup: null,     // 目前操作的團
  curGroupIdx: 0,     // 目前操作的團 index（同天可多個）
  groups: {},         // groups[date][type] = [群組陣列]
  fuzzyIdx: -1,
  editingOrderIdx: -1,
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  try{ S.groups=JSON.parse(localStorage.getItem('grps')||'{}'); }catch(e){}
  try{ S.remoteMenus=JSON.parse(localStorage.getItem('remote_menus')||'null'); }catch(e){}
  renderGrid();
  if(GAS_URL){ syncGAS(); syncMenus(); startSyncPolling(); }
}
function saveG(){ localStorage.setItem('grps',JSON.stringify(S.groups)); }
function setGasUrl(url){
  localStorage.setItem('gas_url',url);
  location.reload();
}
function fmt(d){
  // 用本地時間組 YYYY-MM-DD，避免 toISOString() 跑掉時區（台灣 +08 會變前一天）
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// ═══════════════════════════════════════════════
// 系統重置（密碼保護）
// ═══════════════════════════════════════════════
// ⚠️ 改密碼：把下面這行的字串換成你想要的
const RESET_PASSWORD = 'e118reset';

async function resetAllData(){
  const pw = prompt('⚠️ 系統重置會清除：\n• 雲端所有開團、訂單資料\n• 本機所有開團與設定\n（店家清單與菜單會保留）\n\n請輸入管理密碼：');
  if(pw === null) return; // 取消
  if(pw !== RESET_PASSWORD){ alert('❌ 密碼錯誤'); return; }
  if(!confirm('最後確認：所有開團與訂單資料將被永久刪除，無法復原。\n\n要繼續嗎？')) return;

  toast('⏳ 重置中…');
  // 1. 呼叫 GAS 清雲端
  let cloudOk = true;
  if(GAS_URL){
    try{
      const r = await sendGAS({action:'resetAll', password: RESET_PASSWORD});
      if(!r || r.success === false){
        cloudOk = false;
        console.error('GAS reset failed:', r);
      }
    }catch(e){
      cloudOk = false;
      console.error(e);
    }
  }

  // 2. 清本地（保留店家清單與 GAS_URL 設定）
  const keepKeys = ['shops_drink','shops_food','gas_url'];
  const backup = {};
  keepKeys.forEach(k=>{ const v = localStorage.getItem(k); if(v!==null) backup[k]=v; });
  localStorage.clear();
  Object.entries(backup).forEach(([k,v])=>localStorage.setItem(k,v));

  if(cloudOk){
    alert('✅ 重置完成！\n所有資料已清空，畫面即將重新整理。');
  } else {
    alert('⚠️ 本機已重置，但雲端清除失敗\n（可能 GAS 後端尚未更新支援 resetAll，請重新部署 gas-backend.js）\n\n畫面即將重新整理。');
  }
  setTimeout(()=>location.reload(), 500);
}
function dlbl(k){ const d=new Date(k+'T00:00:00'); return `${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`; }

// ═══════════════════════════════════════════════
// DATE GRID
// ═══════════════════════════════════════════════
function shiftW(d){ S.weekOff+=d; renderGrid(); }
function renderGrid(){
  const today=new Date(), base=new Date(today);
  base.setDate(today.getDate()+S.weekOff*7);
  const dow=base.getDay(), mon=new Date(base);
  mon.setDate(base.getDate()-(dow===0?6:dow-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  document.getElementById('w-lbl').textContent=`${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()}`;
  let h='';
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const k=fmt(d), isTd=fmt(today)===k, isSel=k===S.selDate;
    const dow=d.getDay(); // 0=日 6=六
    const dayCls = dow===6?' sat':(dow===0?' sun':'');
    const g=S.groups[k]||{}, hDr=!!(Array.isArray(g.drink)?g.drink.length:g.drink), hFo=!!(Array.isArray(g.food)?g.food.length:g.food);
    h+=`<div class="dc${dayCls}${isSel?' sel':''}${(hDr||hFo)?' has':''}" onclick="selDate('${k}')">
      <span class="D">${d.getDate()}</span>
      <span class="W">${isTd?'今':WD[d.getDay()]}</span>
      ${hDr||hFo?'<div class="dots">'+(hDr?'<span class="dot dr"></span>':'')+(hFo?'<span class="dot fo"></span>':'')+'</div>':''}
    </div>`;
  }
  document.getElementById('dgrid').innerHTML=h;
}
function selDate(k){
  S.selDate=k; renderGrid();
  renderDay(); go('day');
}

// ═══════════════════════════════════════════════
// PASSWORD
// ═══════════════════════════════════════════════
// 密碼驗證已移除（只有刪除才需要）

// ═══════════════════════════════════════════════
// DAY VIEW
// ═══════════════════════════════════════════════
function renderDay(){
  var k=S.selDate;
  document.getElementById('day-t').textContent=dlbl(k);
  document.getElementById('day-d').textContent=dlbl(k);
  document.getElementById('day-w').textContent=WDF[new Date(k+'T00:00:00').getDay()];
  var g=S.groups[k]||{};
  var rowsHtml='';
  ['drink','food'].forEach(function(type){
    var isDr=type==='drink';
    var nm=isDr?'飲料團':'便當團',cls=isDr?'dr':'fo',ico=isDr?'🧋':'🍱';
    var raw=g[type];
    var grpList=Array.isArray(raw)?raw:(raw?[raw]:[]);
    var cards='';
    grpList.forEach(function(grp,idx){
      var cnt=(grp.orders||[]).length;
      var ann=grp.announcement
        ?('<div style="font-size:.71rem;color:var(--gold);margin-top:5px;background:var(--goldbg);border-radius:6px;padding:5px 8px">📢 '+grp.announcement+'</div>')
        :'';
      var jg="joinGroup('"+type+"',"+idx+")";
      var od="openGroupDetailIdx('"+type+"',"+idx+")";
      cards+='<div style="background:var(--sur);border:2px solid var(--bdr);border-radius:var(--r2);padding:10px 12px;margin-bottom:7px">'
        +'<div style="font-size:.78rem;font-weight:700">'+(grp.shopIcon||'')+' '+grp.shopName+'</div>'
        +'<div style="font-size:.68rem;color:var(--ink2);margin-top:2px">👤 '+grp.hostName+'｜'+cnt+' 人訂購</div>'
        +ann
        +'<div style="display:flex;gap:5px;margin-top:8px">'
        +'<button onclick="'+jg+'" style="flex:1;padding:6px 0;border-radius:7px;border:none;background:var(--dark);color:var(--dktx);font-size:.73rem;font-weight:700;cursor:pointer">＋ 加入點餐</button>'
        +'<button onclick="'+od+'" style="flex:1;padding:6px 0;border-radius:7px;border:1.5px solid var(--bdr2);background:var(--sur);font-size:.73rem;font-weight:700;cursor:pointer">📋 訂單清單</button>'
        +'</div></div>';
    });
    var lbl=grpList.length?('共 '+grpList.length+' 個團'):(isDr?'手搖飲、咖啡':'便當、定食');
    var sg="startNewGroup('"+type+"')";
    rowsHtml+='<div class="tc '+cls+'" style="cursor:default;text-align:left;padding:14px 13px">'
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:'+(grpList.length?'10px':'6px')+'">'
      +'<span style="font-size:1.5rem">'+ico+'</span>'
      +'<div><div class="tc-nm" style="text-align:left">'+nm+'</div>'
      +'<div style="font-size:.67rem;color:var(--ink2)">'+lbl+'</div></div></div>'
      +cards
      +'<button onclick="'+sg+'" style="width:100%;padding:8px 0;border-radius:7px;border:2px dashed var(--bdr2);background:transparent;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--ink2);margin-top:'+(grpList.length?'4px':'0')+'">＋ 開新的'+nm+'</button>'
      +'</div>';
  });
  document.getElementById('trow').innerHTML=rowsHtml;
}


// ═══════════════════════════════════════════════
// MULTI-GROUP NAVIGATION
// ═══════════════════════════════════════════════
function startNewGroup(type){
  // 開新團 → 去選店家
  S.type=type;
  S.curGroupIdx=-1; // 新團
  renderShopSel();
  go('s-shop');
}

function joinGroup(type, idx){
  // 加入現有團點餐
  S.type=type;
  S.curGroupIdx=idx;
  const g=S.groups[S.selDate]||{};
  S.curGroup=(g[type]||[])[idx];
  if(!S.curGroup){ toast('找不到此團'); return; }
  S.persons=[{name:'',cart:{},note:''}];
  S.activePerson=0;
  S.editingOrderIdx=-1;
  renderOrder(); go('order');
}

function openGroupDetailIdx(type, idx){
  S.type=type;
  S.curGroupIdx=idx;
  const g=S.groups[S.selDate]||{};
  S.curGroup=(g[type]||[])[idx];
  if(!S.curGroup){ toast('找不到此團'); return; }
  renderGroupDetail();
  go('s-group');
}

// legacy（單團進入，保留向後相容）
function enterType(type){
  startNewGroup(type);
}
// ═══════════════════════════════════════════════
// GROUP DETAIL：訂單清單 + 刪除團 + 付款確認
// ═══════════════════════════════════════════════
function openGroupDetail(type){
  // 若已有目前團 index 就用該 index，否則取第一個團
  const idx = (typeof S.curGroupIdx === 'number' && S.curGroupIdx >= 0) ? S.curGroupIdx : 0;
  openGroupDetailIdx(type, idx);
}

function renderGroupDetail(){
  const grp = Array.isArray(S.curGroup) ? S.curGroup[0] : S.curGroup;
  if(!grp){ toast('找不到團資料'); return; }
  S.curGroup = grp;
  const isDr = S.type==='drink';
  const orders = grp.orders||[];
  const total   = orders.reduce(function(s,o){return s+(o.total||0);},0);

  // 各付款方式統計
  const cnt = { linepay:0, ipass:0, cash:0, none:0 };
  const amt = { linepay:0, ipass:0, cash:0, none:0 };
  orders.forEach(function(o){
    const k = (o.paidMethod==='linepay'||o.paidMethod==='ipass'||o.paidMethod==='cash') ? o.paidMethod : 'none';
    cnt[k]++;
    amt[k] += o.total||0;
  });

  const grpNum = (S.groups[S.selDate]&&Array.isArray(S.groups[S.selDate][S.type])&&S.groups[S.selDate][S.type].length>1) ? ' #'+(S.curGroupIdx+1) : '';
  document.getElementById('gd-title').textContent=(isDr?'🧋 飲料團':'🍱 便當團')+grpNum+'訂單';
  document.getElementById('gd-sub').textContent=grp.shopName+'｜團主 '+grp.hostName;

  // Build orders HTML
  let ordersHtml = '';
  if(orders.length===0){
    ordersHtml = '<div style="color:var(--ink3);text-align:center;padding:24px;font-size:.85rem">尚無人訂購</div>';
  } else {
    orders.forEach(function(o,i){
      const items = (o.items||[]).map(function(it){return it.name+' × '+it.qty;}).join('　');
      let pmBadge;
      if(o.paidMethod==='linepay'){
        pmBadge='<span style="display:inline-flex;align-items:center;gap:5px;background:#06c755;color:#fff;padding:5px 12px;border-radius:7px;font-size:.74rem;font-weight:900">💚 LINE Pay</span>';
      } else if(o.paidMethod==='ipass'){
        pmBadge='<span style="display:inline-flex;align-items:center;gap:5px;background:#ee7000;color:#fff;padding:5px 12px;border-radius:7px;font-size:.74rem;font-weight:900">💳 iPass Money</span>';
      } else if(o.paidMethod==='cash'){
        pmBadge='<span style="display:inline-flex;align-items:center;gap:5px;background:#fbbf24;color:#1a1714;padding:5px 12px;border-radius:7px;font-size:.74rem;font-weight:900">💵 現金</span>';
      } else {
        pmBadge='<span style="display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;color:#64748b;padding:5px 12px;border-radius:7px;font-size:.74rem;font-weight:700">— 未選擇</span>';
      }
      ordersHtml += '<div class="order-card">'
        +'<div class="oc-top"><span class="oc-name">👤 '+o.name+'</span><span class="oc-total">NT$'+o.total+'</span></div>'
        +'<div class="oc-items">'+items+'</div>'
        +(o.note?'<div style="font-size:.72rem;color:var(--ink3);margin-top:3px">📝 '+o.note+'</div>':'')
        +'<div style="display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap">'
        +'<div style="flex:1;min-width:120px">'+pmBadge+'</div>'
        +'<button onclick="startEditOrder('+i+')" style="padding:5px 10px;border-radius:7px;border:1.5px solid var(--bdr2);background:var(--sur);font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap">✏️ 修改</button>'
        +'<button onclick="deleteOrder('+i+')" style="padding:5px 10px;border-radius:7px;border:1.5px solid #fca5a5;background:#fef2f2;color:#dc2626;font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap">🗑 刪除</button>'
        +'</div></div>';
    });
  }

  const wrap = document.getElementById('gd-wrap');
  wrap.innerHTML = ''
    +'<div class="gd-hero '+(isDr?'dr':'fo')+'">'
      +'<div class="gd-shop">'+(grp.shopIcon||'')+' '+grp.shopName+'</div>'
      +'<div class="gd-host">👤 團主：'+grp.hostName+'</div>'
      +(grp.announcement?'<div style="margin-top:7px;font-size:.76rem;opacity:.9">📢 '+grp.announcement+'</div>':'')
      +'<div class="gd-stats">'
        +'<div class="gd-stat"><span class="v">'+orders.length+'</span><span class="l">總訂單</span></div>'
        +'<div class="gd-stat"><span class="v" style="color:#86efac">'+cnt.linepay+'</span><span class="l">💚 LINE Pay</span></div>'
        +'<div class="gd-stat"><span class="v" style="color:#fdba74">'+cnt.ipass+'</span><span class="l">💳 iPass</span></div>'
        +'<div class="gd-stat"><span class="v" style="color:#fde68a">'+cnt.cash+'</span><span class="l">💵 現金</span></div>'
      +'</div>'
      +'<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.18);display:flex;justify-content:space-between;font-size:.84rem;font-weight:900">'
        +'<span>總金額</span>'
        +'<span style="color:#fbbf24;font-family:\'DM Mono\',monospace">NT$'+total+'</span>'
      +'</div>'
    +'</div>'
    +'<div class="sect">訂單明細（所有人可見）</div>'
    +ordersHtml
    +'<div class="sect" style="margin-top:16px">操作</div>'
    +'<button onclick="exportPDF()" style="display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border-radius:9px;border:2px solid var(--drbdr);background:var(--drbg);color:var(--dr);font-size:.84rem;font-weight:700;cursor:pointer;margin-bottom:8px">📄 匯出訂單 PDF</button>'
    +'<button class="del-group-btn" onclick="deleteGroup()">🗑 取消此次開團（刪除所有訂單）</button>'
    +'<div style="font-size:.7rem;color:var(--ink3);text-align:center;margin-top:6px">刪除後無法復原，請確認所有同學已收到通知</div>';
}


function togglePaid(orderIdx){
  const grp=S.curGroup;
  if(!grp||!grp.orders) return;
  grp.orders[orderIdx].paid = !grp.orders[orderIdx].paid;
  saveG();
  if(GAS_URL) sendGAS({action:'updateOrderPaid',dateKey:S.selDate,type:S.type,groupIdx:S.curGroupIdx,orderIdx,paid:grp.orders[orderIdx].paid});
  renderGroupDetail();
  toast(grp.orders[orderIdx].paid?'✅ 已標記付款':'已取消付款狀態');
}

async function deleteOrder(orderIdx){
  const grp=S.curGroup;
  if(!grp||!grp.orders||!grp.orders[orderIdx]) return;
  const o = grp.orders[orderIdx];
  if(!confirm('確定要刪除「'+o.name+'」的訂單嗎？\n（NT$'+o.total+'，此動作無法復原）')) return;
  // 先存原資料以便失敗回滾
  const backup = grp.orders.slice();
  grp.orders.splice(orderIdx,1);
  saveG();
  renderGroupDetail();
  toast('⏳ 刪除中…');
  if(GAS_URL){
    try{
      const r = await sendGAS({action:'deleteOrder',dateKey:S.selDate,type:S.type,groupIdx:S.curGroupIdx,orderIdx,name:o.name});
      if(r && r.success === false){
        // 失敗回滾
        grp.orders = backup;
        saveG();
        renderGroupDetail();
        toast('❌ 刪除失敗：'+(r.error||''));
        return;
      }
    }catch(e){
      console.error(e);
      grp.orders = backup;
      saveG();
      renderGroupDetail();
      toast('❌ 刪除失敗，已還原');
      return;
    }
  }
  toast('🗑 已刪除「'+o.name+'」的訂單');
}

function deleteGroup(){
  // 用自製 modal 取代 iOS 不支援的 confirm/prompt
  const existing = document.getElementById('delete-modal');
  if(existing) existing.remove();
  const m = document.createElement('div');
  m.id = 'delete-modal';
  m.className = 'cf-modal';
  m.innerHTML = `
    <div class="cf-sheet">
      <div class="cf-title">🗑 確認刪除開團</div>
      <div class="cf-msg">此操作將清除所有訂單，<b>無法復原</b>。<br>請輸入班級密碼確認：</div>
      <input class="cf-pw" id="del-pw-input" type="password" placeholder="輸入班級密碼"
        maxlength="20" onkeydown="if(event.key==='Enter') confirmDelete()">
      <div class="cf-btns">
        <button class="btn btn-out" style="flex:1" onclick="document.getElementById('delete-modal').remove()">取消</button>
        <button class="btn" style="flex:1;background:#dc2626;color:#fff" onclick="confirmDelete()">確認刪除</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  setTimeout(()=>document.getElementById('del-pw-input')?.focus(), 100);
}

function confirmDelete(){
  const pw = document.getElementById('del-pw-input')?.value||'';
  const input = document.getElementById('del-pw-input');
  if(pw !== PW){
    if(input){ input.classList.add('err'); input.value=''; input.placeholder='密碼錯誤，請重試'; setTimeout(()=>input.classList.remove('err'),400); }
    return;
  }
  document.getElementById('delete-modal')?.remove();
  const k=S.selDate;
  if(S.groups[k]?.[S.type]) {
    S.groups[k][S.type].splice(S.curGroupIdx, 1);
    if(S.groups[k][S.type].length===0) delete S.groups[k][S.type];
  }
  saveG();
  if(GAS_URL) sendGAS({action:'deleteGroup',dateKey:k,type:S.type,groupIdx:S.curGroupIdx});
  renderDay();
  go('day');
  toast('✅ 已刪除開團');
}

// ── 模糊搜尋 ──
function fuzzy(q){
  const drop=document.getElementById('fdrop');
  S.fuzzyIdx=-1;
  if(!q.trim()){ drop.classList.remove('on'); return; }
  const list=getShopList(S.type);
  const hits=list.map((s,i)=>{
    const itemTxt=(s.menu||[]).map(m=>m.name).join(' ');
    const nameSc=fScore(q,s.name+s.addr);
    const itemSc=fScore(q,itemTxt);
    let matched='';
    if(itemSc>0&&nameSc===0){
      const m=(s.menu||[]).find(m=>fScore(q,m.name)>0);
      if(m) matched=m.name;
    }
    return {s,i,sc:nameSc*2+itemSc,matched};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,10);
  if(!hits.length){ drop.classList.remove('on'); return; }
  drop.innerHTML=hits.map(({s,i,matched})=>{
    const sub=matched?`含品項「${hilight(matched,q)}」`:s.addr;
    return `<div class="fitem" onclick="pickShop(${i})">
      <div class="fi-nm">${hilight(s.name,q)} ${s.icon}</div>
      <div class="fi-ad">${sub}</div>
    </div>`;
  }).join('');
  drop.classList.add('on');
}
function fScore(q,t){ let sc=0,last=-1; for(const c of q){ const i=t.indexOf(c,last+1); if(i>=0){sc+=1+(i===last+1?1:0);last=i;} } return sc; }
function hilight(t,q){ let r=t; for(const c of new Set(q)) r=r.replaceAll(c,`<span class="fhi">${c}</span>`); return r; }
function fuzzyKey(e){
  const its=[...document.querySelectorAll('.fitem')];
  if(!its.length) return;
  if(e.key==='ArrowDown'){e.preventDefault();S.fuzzyIdx=Math.min(S.fuzzyIdx+1,its.length-1);its.forEach((x,i)=>x.classList.toggle('hi',i===S.fuzzyIdx));its[S.fuzzyIdx]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();S.fuzzyIdx=Math.max(S.fuzzyIdx-1,0);its.forEach((x,i)=>x.classList.toggle('hi',i===S.fuzzyIdx));}
  else if(e.key==='Enter'){e.preventDefault();if(S.fuzzyIdx>=0)its[S.fuzzyIdx].click();}
  else if(e.key==='Escape')document.getElementById('fdrop').classList.remove('on');
}

// ── 全店搜尋（跨類型 + 品項）──
function globalFuzzy(q){
  const drop=document.getElementById('gfdrop');
  S.gFuzzyIdx=-1;
  if(!q.trim()){ drop.classList.remove('on'); return; }

    const nameSc=fScore(q,s.name+s.addr);
    const itemSc=fScore(q,itemTxt);
    // 店名命中加權,品項命中其次
    const sc=nameSc*2+itemSc;
    let matched='';
    if(itemSc>0&&nameSc===0){
      // 找出最短的命中品項顯示
      const m=(s.menu||[]).find(m=>fScore(q,m.name)>0);
      if(m) matched=m.name;
    }
    return {s,i,type,sc,matched};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,12);
  if(!hits.length){

// 📸 菜單照片上傳 + Claude Vision AI 辨識
// ═══════════════════════════════════════════════
async function handleMenuImg(e){
  const file = e.target.files[0];
  if(!file) return;

  // Preview image
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const dataUrl = ev.target.result;
    const preview = document.getElementById('menu-upload-preview');
    const zone = document.getElementById('menu-upload-zone');
    if(preview) preview.innerHTML = `<img src="${dataUrl}" alt="菜單">`;
    if(zone) zone.classList.add('has');

    // Extract base64 (remove prefix)
    const base64 = dataUrl.split(',')[1];
    const mimeType = file.type || 'image/jpeg';

    // Show OCR progress
    const ocrBox = document.getElementById('ocr-box');
    const ocrSteps = document.getElementById('ocr-steps');
    if(ocrBox) ocrBox.classList.add('on');

    function setOcrSteps(steps){
      if(ocrSteps) ocrSteps.innerHTML = steps.map(s =>
        `<div class="ocr-step ${s.st}"><span class="dot"></span>${s.txt}</div>`
      ).join('');
    }

    try{
      setOcrSteps([{st:'load',txt:'AI 正在辨識菜單照片…'}]);

      if(!GAS_URL){
        setOcrSteps([{st:'',txt:'⚠️ 尚未設定 GAS_URL，無法使用拍照辨識'}]);
        return;
      }
      const resp = await fetch(GAS_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain'},  // 用 text/plain 避免 GAS CORS preflight
        body: JSON.stringify({
          action:'recognizeMenu',
          mimeType: mimeType,
          imageBase64: base64
        })
      });

      if(!resp.ok){
        const errTxt = await resp.text();
        throw new Error(`HTTP ${resp.status}`);
      }

      setOcrSteps([{st:'done',txt:'辨識完成'},{st:'load',txt:'解析菜單資料…'}]);

      const data = await resp.json();
      if(!data.success) throw new Error(data.error || '辨識失敗');
      const rawText = data.rawText || '';
      if(!rawText) throw new Error('辨識失敗：沒有回傳內容');

      // Parse JSON（即使被截斷也搶救品項）
      let result = {shopName:'', items:[]};
      const cleaned = rawText.replace(/```json/g,'').replace(/```/g,'').trim();
      try{
        const s = cleaned.indexOf('{'), en = cleaned.lastIndexOf('}');
        if(s>=0 && en>s) result = JSON.parse(cleaned.slice(s,en+1));
      }catch(pe){
        console.warn('full parse fail, fallback to item extraction:', rawText.slice(0,200));
        // 抓 shopName
        const nameMatch = cleaned.match(/"shopName"\s*:\s*"([^"]*)"/);
        if(nameMatch) result.shopName = nameMatch[1];
        // 用 regex 把每個 {name,price,cat} 物件挑出來
        const itemRegex = /\{\s*"name"\s*:\s*"([^"]+)"\s*,\s*"price"\s*:\s*(\d+)\s*,\s*"cat"\s*:\s*"([^"]*)"\s*\}/g;
        const items = [];
        let m;
        while((m = itemRegex.exec(cleaned)) !== null){
          items.push({name:m[1], price:parseInt(m[2]), cat:m[3]});
        }
        result.items = items;
      }

      const items = (result.items||[])
        .map(it=>({
          name: String(it.name||'').trim(),
          price: parseInt(String(it.price||'0').replace(/[^\d]/g,''))||0,
          cat: String(it.cat||'').trim()
        }))
        .filter(it => it.name && it.name.length > 0);

      if(items.length === 0){
        setOcrSteps([{st:'',txt:'⚠️ 無法辨識品項，請確認照片清晰度'}]);
        return;
      }

      setOcrSteps([
        {st:'done',txt:'辨識完成'},
        {st:'done',txt:`✅ 辨識到 ${items.length} 個品項`}
      ]);

      // 跳出 modal 讓使用者確認店名 + 決定是否存入店家資料庫
      const detectedName = result.shopName || '';
      saveOcrShopModal(detectedName, items);

    }catch(err){
      console.error('OCR error:', err);
      setOcrSteps([{st:'',txt:'⚠️ ' + (err.message||'辨識失敗')}]);
    }
  };
  reader.readAsDataURL(file);
}

// AI MENU FETCH  ← 核心修正
// ═══════════════════════════════════════════════
async function runAI(){
  const shop = S.shopSel;
  const isDr = S.type === 'drink';

  function setSteps(steps){
    const el = document.getElementById('ai-steps');
    if(el) el.innerHTML = steps.map(s =>
      `<div class="aist ${s.st}"><span class="dot"></span>${s.txt}</div>`
    ).join('');
  }

  // ★ 改成呼叫 GAS（伺服器端），GAS 再去呼叫 Anthropic API
  // 這樣完全沒有 CORS 問題
  if(!GAS_URL){
    setSteps([{st:'',txt:'⚠️ 未設定 GAS_URL，請手動新增品項'}]);
    S.aiMenu = [];
    await new Promise(r=>setTimeout(r,800));
    S.setupStep = 1; renderSetup(); return;
  }

  try{
    setSteps([{st:'load',txt:`透過伺服器搜尋「${shop.name}」菜單…`}]);

    const url = `${GAS_URL}?action=getMenu&shop=${encodeURIComponent(shop.name)}&type=${S.type}`;
    const resp = await fetch(url);

    if(!resp.ok) throw new Error(`GAS HTTP ${resp.status}`);

    const data = await resp.json();

    if(!data.success) throw new Error(data.error || 'GAS 回傳錯誤');

    S.aiMenu = (data.items || []).slice(0, 20);
    if(data.shopName) S.shopSel.name = data.shopName;

    setSteps([
      {st:'done',txt:'搜尋完成'},
      {st:'done',txt:`✅ 找到 ${S.aiMenu.length} 個品項`}
    ]);
    await new Promise(r=>setTimeout(r,700));

  }catch(err){
    console.error('runAI error:', err.message);
    const el = document.getElementById('ai-steps');
    if(el) el.innerHTML = `
      <div class="aist"><span class="dot"></span>⚠️ ${(err.message||'搜尋失敗').slice(0,80)}</div>
      <div class="aist" style="color:rgba(245,240,232,.38)">可在下方手動新增品項</div>`;
    S.aiMenu = [];
    await new Promise(r=>setTimeout(r,1000));
  }
  S.setupStep = 1; renderSetup();
}

async function doCreate(){
  // 不再需要團主填付款帳號:三種付款方式內建,由點餐人自選
  S.payMethod='all'; S.payLink=''; S.ipassLink='';

  const k=S.selDate;
  if(!S.groups[k]) S.groups[k]={};
  if(!S.groups[k][S.type]) S.groups[k][S.type]=[];
  const grp={
    type:S.type, hostName:S.hostName, announcement:S.announcement||'',
    shopName:S.shopSel.name, shopAddr:S.shopSel.addr, shopIcon:S.shopSel.icon||'🏪', shopTel:S.shopSel.tel||'',
    menu:S.aiMenu, payMethod:S.payMethod, payLink:S.payLink, ipassLink:S.ipassLink||'', payQr:'',
    orders:[], createdAt:new Date().toISOString()
  };
  S.groups[k][S.type].push(grp); saveG();
  S.curGroupIdx = S.groups[k][S.type].length - 1;

  if(GAS_URL){
    toast('⏳ 同步到雲端…');
    const r = await sendGAS({action:'createGroup',dateKey:k,type:S.type,groupIdx:S.curGroupIdx,group:{...grp,payQr:''}});
    if(!r.success){
      toast('⚠️ 雲端同步失敗,本地已儲存');
    } else {
      toast('🎉 開團成功！');
    }
  } else {
    toast('🎉 開團成功！');
  }
  renderDay();
  go('day');
}

function renderCartSummary(){

function goConfirm(){

  S._pendingPayMethod = null;
  // Save current note
  const noteEl = document.getElementById('ord-note');
  if(noteEl) S.persons[S.activePerson].note = noteEl.value;

  // Validate all persons have name and at least one item
  const valid = S.persons.filter(p=>p.name && Object.values(p.cart||{}).some(cups=>cups?.length>0));
  if(valid.length===0){ toast('請先選擇姓名並點選品項！'); return; }

  const grp=S.curGroup, menu=grp.menu||[];

  // Build order summary for all persons (new cart: cart[i] = array of cups)
  const allPersonSummary = S.persons
    .filter(p=>p.name && Object.values(p.cart||{}).some(cups=>cups?.length>0))
    .map(p=>{
      // Flatten cups into items
      const items=[];
      Object.entries(p.cart||{}).forEach(([i,cups])=>{
        if(!cups?.length) return;
        const m=menu[parseInt(i)]; if(!m) return;
        // Group identical sugar/ice combos
        const grouped={};
        cups.forEach(cup=>{
          const key=cup.sugar&&cup.ice?`${cup.sugar}/${cup.ice}`:'';
          grouped[key]=(grouped[key]||0)+1;
        });
        Object.entries(grouped).forEach(([spec,qty])=>{
          const nameFull=spec?`${m.name}（${spec}）`:m.name;
          items.push({name:nameFull, qty, price:m.price, sub:m.price*qty, spec});
        });
      });
      const total=items.reduce((s,it)=>s+it.sub,0);
      return {name:p.name, note:p.note||'', items, total};
    });

  const grandTotal = allPersonSummary.reduce((s,p)=>s+p.total,0);
  const name = allPersonSummary.map(p=>p.name).join(''); // legacy compat
  const items = allPersonSummary[0]?.items||[];
  const total = grandTotal;
  const note = allPersonSummary[0]?.note||'';
  // store for submit
  S._pendingOrders = allPersonSummary;

  // Multi-person confirm UI
  const orderCards = allPersonSummary.map(p=>`
    <div class="sc" style="margin-bottom:8px">
      <div class="sc-hd">👤 ${p.name}</div>
      ${p.items.map(function(it){return '<div class="sc-row"><span><span class="sc-q">'+it.qty+'×</span>'+it.name+'</span><span class="sc-p">NT$'+it.sub+'</span></div>';}).join('')}
      ${p.note?`<div class="sc-row"><span>備註</span><span style="font-size:.74rem;color:var(--ink2)">${p.note}</span></div>`:''}
      <div class="sc-tot"><span>小計</span><span class="sc-ta">NT$${p.total}</span></div>
    </div>`).join('');

// LINE Pay: 開啟 LINE 錢包頁
// iPass Money: 開啟一卡通 MONEY (universal link → fallback App Store)
// 現金: 純資訊
// 三個付款方式按鈕 — 三狀態流程
// 狀態 1 (idle):三顆按鈕並排,可點選
// 狀態 2 (selected):點完一顆 → 該顆高亮 + 其他兩顆灰但仍可點切換 + 下方出現「✅ 確認送出」「↩️ 取消」兩顆按鈕

// pickerName: 全域函式名稱字串,呼叫方式: pickerName(...extraArgs, method)
function payBtns(grp, pickerName, extraArgs){
  const argsJson = JSON.stringify(extraArgs||[]);

// 共用工具:取得 group 元素
function _pmGroup(el){ return el.closest('.pay-method-group'); }

// ── 點任一付款按鈕:選擇/切換 ──
function selectPayMethod(btn, method){
  const group = _pmGroup(btn);
  if(!group) return;
  if(group.dataset.state === 'committed') return; // 已送出不可改
  group.dataset.state = 'selected';
  group.dataset.selected = method;
  const all = group.querySelectorAll('.pay-method-btn');
  all.forEach(b => {
    const isSel = (b === btn);
    b.style.transition = 'all .2s';
    if(isSel){
      b.style.border = '3px solid #1a1714';
      b.style.transform = 'scale(1.03)';
      b.style.boxShadow = '0 6px 18px rgba(0,0,0,.25)';
      b.style.opacity = '1';
      b.style.filter = 'none';
      const sub = b.querySelector('.pmb-sub');
      if(sub) sub.textContent = '✓ 已選擇';
    } else {
      b.style.border = '3px solid transparent';
      b.style.transform = 'scale(1)';
      b.style.boxShadow = 'none';
      b.style.opacity = '.4';
      b.style.filter = 'grayscale(.5)';
      const sub = b.querySelector('.pmb-sub');
      if(sub) sub.textContent = '點擊改選';
    }
  });
  // 顯示確認/取消區 — 只有存在合法 picker 才顯示 (避免 s-confirm 上的付款按鈕靜默失敗)
  const _picker = group.dataset.picker;
  const _hasPicker = _picker && _picker !== 'undefined' && typeof window[_picker] === 'function';
  const actions = group.querySelector('.pmg-actions');
  if(actions && _hasPicker) actions.style.display = 'flex';
}

// ── 取消選擇:回到 idle ──
function resetPayMethod(triggerBtn){
  const group = _pmGroup(triggerBtn);
  if(!group) return;
  group.dataset.state = 'idle';
  group.dataset.selected = '';
  const all = group.querySelectorAll('.pay-method-btn');
  all.forEach(b => {
    b.disabled = false;
    b.style.border = '3px solid transparent';
    b.style.transform = 'scale(1)';
    b.style.boxShadow = '';
    b.style.opacity = '1';
    b.style.filter = 'none';
    b.style.cursor = 'pointer';
    const sub = b.querySelector('.pmb-sub');
    if(sub) sub.textContent = '點擊選擇';
  });
  const actions = group.querySelector('.pmg-actions');
  if(actions) actions.style.display = 'none';
}

// ── 確認送出:呼叫 picker → 切到 committed 狀態(只剩選定那顆) ──
function commitPayMethod(triggerBtn){
  const group = _pmGroup(triggerBtn);
  if(!group) return;
  const method = group.dataset.selected;
  if(!method) return;
  const picker = group.dataset.picker;
  const args = JSON.parse((group.dataset.args||'[]').replace(/&#39;/g,"'"));
  if(typeof window[picker] !== 'function'){
    console.error('payment picker not found:', picker);
    return;
  }
  // 標記成 committed,讓 picker 內部 render committed UI
  group.dataset.state = 'committed';
  window[picker](...args, method);
}

// ── 由 confirm*Payment 內部呼叫:把 group 換成已確認的精簡顯示 ──
function renderCommittedPayUI(area, method, hostName){
  const labels = {

    cash:    { ico:'💵', name:'現金',      bg:'#fbbf24', fg:'#1a1714' }

  area.innerHTML = `

      <div style="font-size:.72rem;font-weight:900;color:#15803d;letter-spacing:.06em;margin-bottom:8px">✅ 已記錄付款方式</div>
      <div style="display:inline-flex;align-items:center;gap:10px;background:${c.bg};color:${c.fg};border-radius:10px;padding:14px 22px;font-size:1.05rem;font-weight:900;box-shadow:0 4px 14px rgba(0,0,0,.15)">

    </div>`;
}

// ── 取消已送出:回到三按鈕選擇狀態 ──
async function undoCommitPay(btn){
  // 找到 confirm function 的 idx (從 area parent 推) — 簡化:從目前 active screen 上的 group 重新 render
  // 用一個全域記錄
  const ctx = window._lastCommitContext;
  if(!ctx) return;
  const grp = S.curGroup;
  if(!grp) return;
  // reset 訂單為未付款
  ctx.idxs.forEach(i => {
    if(grp.orders[i]){
      grp.orders[i].paid = false;
      grp.orders[i].paidMethod = null;
    }
  });
  saveG();
  // 同步 GAS
  if(GAS_URL){
    await Promise.all(ctx.idxs.map(i =>
      sendGAS({action:'updateOrderPaid', dateKey:S.selDate, type:S.type, groupIdx:S.curGroupIdx, orderIdx:i, paid:false, paidMethod:''})
    ));
  }
  // 重新渲染按鈕區 (注意 confirmAllPayments 第一個參數是陣列,confirmMyPayment 是 number)
  const area = document.getElementById('pay-choice-area');
  if(area){
    const extraArg = (ctx.picker === 'confirmAllPayments') ? [ctx.idxs] : [ctx.idxs[0]];
    area.innerHTML = payBtns(grp, ctx.picker, extraArg);
  }
  toast('↩️ 已取消，請重新選擇');
}

async function doSubmitAll(){
  if(S._submitting) return;
  const pendingOrders = S._pendingOrders || [];
  if(!pendingOrders.length){ toast('沒有待送出的訂單'); return; }
  if(!S._pendingPayMethod){
    toast('⚠️ 請先選擇付款方式');
    const area = document.getElementById('pay-choice-area');
    if(area) area.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  S._submitting = true;
  // 立即鎖定送出按鈕，避免重複點擊
  const submitBtn = document.querySelector('#s-confirm button.btn-dk');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.style.opacity='.6'; submitBtn.textContent='⏳ 送出中…'; }
  toast('⏳ 送出訂單中…');

  const grp = S.curGroup;
  grp.orders = grp.orders||[];
  const ts = new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
  const myOrderIdxs = [];
  const payMethod = S._pendingPayMethod;

  const toSend = [];
  pendingOrders.forEach(p=>{
    const order={name:p.name, total:p.total, note:p.note, items:p.items, paid:true, paidMethod:payMethod, ts};
    grp.orders.push(order);
    myOrderIdxs.push(grp.orders.length-1);
    toSend.push(order);
  });
  saveG();
  // 同步到 GAS (等待完成,確保雲端有資料)
  if(GAS_URL){
    toast('⏳ 送出訂單中…');
    await Promise.all(toSend.map(order =>
      sendGAS({action:'submitOrder',dateKey:S.selDate,type:S.type,groupIdx:S.curGroupIdx,order})
    ));
    // 後端 submitOrder 不寫 paid/paidMethod，需再補一刀 updateOrderPaid
    await Promise.all(myOrderIdxs.map(i =>
      sendGAS({action:'updateOrderPaid',dateKey:S.selDate,type:S.type,groupIdx:S.curGroupIdx,orderIdx:i,paid:true,paidMethod:payMethod})
    ));
  }
  S._pendingPayMethod = null;
  S._submitting = false;
  renderDoneAll(pendingOrders, myOrderIdxs, payMethod);
  go('s-done');
}

  const pmBg = payMethod==='linepay'?'#06c755':payMethod==='ipass'?'#ee7000':'#fbbf24';
  const pmFg = payMethod==='cash'?'#1a1714':'#fff';
  const receiptCards = pendingOrders.map((p,pi)=>`
    <div class="sc" style="margin-bottom:8px">
      <div class="sc-hd">📄 ${p.name} 的收據</div>
      ${p.items.map(function(it){return '<div class="sc-row"><span>'+it.name+'×'+it.qty+'</span><span class="sc-p">NT$'+it.sub+'</span></div>';}).join('')}
      ${p.note?`<div class="sc-row"><span>備註</span><span>${p.note}</span></div>`:''}

  document.getElementById('dn-wrap').innerHTML=`

    </div>

    <div class="paybox">
      <div class="pb-t">💳 付款給團主 ${grp.hostName}</div>
      <div class="pb-a">NT$${grandTotal}</div>
      <div style="display:inline-flex;align-items:center;gap:10px;background:${pmBg};color:${pmFg};border-radius:10px;padding:14px 22px;font-size:1.05rem;font-weight:900;box-shadow:0 4px 14px rgba(0,0,0,.15);margin-top:6px">
        <span style="font-size:1.5rem">${pmIco}</span>
        <span>已記錄付款方式：${pmLabel}</span>
      </div>
      <div style="font-size:.72rem;color:var(--ink2);margin-top:8px">團主會在訂單清單看到此付款方式</div>
    </div>
    <button class="btn btn-out btn-full" style="margin-bottom:8px" onclick="openGroupDetail('${S.type}')">
      📋 查看今日訂單清單
    </button>
    <button class="btn btn-dk btn-full" onclick="resetAndGoHome()">← 回首頁</button>`;
}

async function confirmAllPayments(idxs, method){
  if(!method) return;
  const grp=S.curGroup;
  (idxs||[]).forEach(i=>{
    if(grp.orders[i]){
      grp.orders[i].paid=true;
      grp.orders[i].paidMethod=method;
    }
  });
  saveG();
  if(GAS_URL){
    await Promise.all((idxs||[]).map(i =>
      sendGAS({action:'updateOrderPaid', dateKey:S.selDate, type:S.type, groupIdx:S.curGroupIdx, orderIdx:i, paid:true, paidMethod:method})
    ));
  }
  // 記錄 undo context
  window._lastCommitContext = { picker:'confirmAllPayments', idxs:[...(idxs||[])] };
  // 切換 UI 到 committed 狀態
  const area = document.getElementById('pay-choice-area');
  if(area) renderCommittedPayUI(area, method, grp.hostName);
  toast('✅ 付款方式已記錄 ('+payMethodLabel(method)+')');
}

// ── 修改訂單功能 ──
function startEditOrder(orderIdx){
  S.editingOrderIdx = orderIdx;
  const order = S.curGroup.orders[orderIdx];
  if(!order) return;
  // Reconstruct cart from order items
  const menu = S.curGroup.menu||[];
  const cart={};
  order.items.forEach(oi=>{
    const menuIdx = menu.findIndex(m=>m.name===oi.name);
    if(menuIdx>=0) cart[menuIdx]=oi.qty;
  });
  S.persons=[{name:order.name, cart, note:order.note||''}];
  S.activePerson=0;
  go('order');
  renderEditOrder();
}

function renderEditOrder(){
  const grp=S.curGroup, isDr=S.type==='drink';
  const order=grp.orders[S.editingOrderIdx];
  document.getElementById('ord-t').textContent='✏️ 修改訂單';
  document.getElementById('ord-s').textContent=`${order?.name} — ${grp.shopName}`;
  const menu=grp.menu||[];
  const cart=S.persons[0]?.cart||{};
  document.getElementById('ord-wrap').innerHTML=`
    <div class="edit-order-card">
      <div style="font-size:.72rem;font-weight:700;color:var(--gold);margin-bottom:4px">✏️ 修改 ${order?.name} 的訂單</div>
      <div style="font-size:.76rem;color:var(--ink2)">重新選擇品項後按確認更新</div>
    </div>
    <div class="sect">重新選擇品項</div>
    <div class="olist" id="olist"></div>
    <div class="sect">備註</div>
    <textarea class="fin" style="padding-left:14px;resize:none;height:48px" id="ord-note"
      placeholder="特殊需求…">${order?.note||''}</textarea>
    <button class="btn btn-gold btn-full mt12" onclick="saveEditOrder()">💾 確認更新訂單</button>
    <button class="btn btn-out btn-full mt8" onclick="cancelEdit()">取消</button>
  `;
  renderOList();
}

function saveEditOrder(){
  const idx=S.editingOrderIdx;
  const grp=S.curGroup, menu=grp.menu||[];
  const cart=S.persons[0]?.cart||{};
  const note=document.getElementById('ord-note')?.value||'';
  const items=[];
  Object.entries(cart).forEach(([i,cups])=>{
    if(!cups?.length) return;
    const m=menu[parseInt(i)]; if(!m) return;
    const grouped={};
    cups.forEach(cup=>{ const k=cup.sugar&&cup.ice?`${cup.sugar}/${cup.ice}`:''; grouped[k]=(grouped[k]||0)+1; });
    Object.entries(grouped).forEach(([spec,qty])=>{
      items.push({name:spec?`${m.name}（${spec}）`:m.name, qty, price:m.price, sub:m.price*qty});
    });
  });
  if(!items.length){toast('請至少選一個品項');return;}
  const total=items.reduce((s,it)=>s+it.sub,0);
  grp.orders[idx]={...grp.orders[idx],items,total,note,editedAt:new Date().toLocaleString('zh-TW')};
  saveG();
  S.editingOrderIdx=-1; S.persons=[];
  toast('✅ 訂單已更新！');
  renderGroupDetail(); go('s-group');
}

function cancelEdit(){
  S.editingOrderIdx=-1; S.persons=[];
  renderGroupDetail(); go('s-group');
}

async function confirmMyPayment(idx, method){
  const grp = S.curGroup;
  if(!grp || !grp.orders || !grp.orders[idx] || !method) return;
  grp.orders[idx].paid = true;
  grp.orders[idx].paidMethod = method;
  saveG();
  if(GAS_URL){
    await sendGAS({action:'updateOrderPaid', dateKey:S.selDate, type:S.type, groupIdx:S.curGroupIdx, orderIdx:idx, paid:true, paidMethod:method});
  }
  window._lastCommitContext = { picker:'confirmMyPayment', idxs:[idx] };
  const area = document.getElementById('pay-choice-area');
  if(area) renderCommittedPayUI(area, method, grp.hostName);
  toast('✅ 付款方式已記錄 ('+payMethodLabel(method)+')');
}

// 寫入 GAS:使用 text/plain 避免 CORS preflight,awaitable
async function sendGAS(p){
  if(!GAS_URL) return {success:false,error:'no GAS_URL'};
  // 記錄最後一次寫入時間,讓 polling 暫緩避免覆蓋本地
  S._lastWriteAt = Date.now();
  try{
    const r = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(p)
    });
    if(!r.ok) return {success:false,error:'HTTP '+r.status};
    return await r.json();
  }catch(e){
    console.warn('sendGAS failed:', e.message);
    return {success:false, error:e.message};
  }
}
// ★ 從 GAS 讀取最新店家菜單（背景執行）
async function syncMenus(){
  if(!GAS_URL) return;
  try{
    const r = await fetch(GAS_URL+'?action=getMenus');
    const d = await r.json();
    if(d.success){
      S.remoteMenus = { drinks: d.drinks||[], foods: d.foods||[] };
      localStorage.setItem('remote_menus', JSON.stringify(S.remoteMenus));
    }
  }catch(e){ console.warn('syncMenus failed:', e.message); }
}

// 取得目前有效的店家列表（優先用 GAS，否則用內建）
function getShopList(type){
  const isDr = type==='drink';
  if(S.remoteMenus){
    const list = isDr ? S.remoteMenus.drinks : S.remoteMenus.foods;
    if(list && list.length > 0) return list;
  }
  return isDr ? DRINK_LIST : FOOD_LIST;
}

async function syncGAS(){
  // 剛寫入 GAS 後 5 秒內不拉,避免覆蓋還沒同步到遠端的本地資料
  if(S._lastWriteAt && (Date.now()-S._lastWriteAt) < 5000) return;
  try{
    const r=await fetch(GAS_URL+'?action=getGroups&_t='+Date.now());
    const d=await r.json();
    if(!(d.success && d.groups)) return;
    // 先正規化:舊格式 {type:grp} 轉新格式 {type:[grp]}
    const remote = d.groups;
    Object.keys(remote).forEach(date=>{
      Object.keys(remote[date]).forEach(type=>{
        if(!Array.isArray(remote[date][type])) remote[date][type]=[remote[date][type]];
      });
    });
    // 深度合併:
    // - 遠端有的團,用遠端版本(含最新訂單/付款狀態)
    // - 本地獨有的團(剛建但遠端還沒回來),保留
    // - 同一團內的 orders,以遠端為主,再補上本地獨有的 (用 name+ts 作 key)
    const local = S.groups || {};
    const out = {};
    const allDates = new Set([...Object.keys(local), ...Object.keys(remote)]);
    allDates.forEach(date=>{
      out[date] = {};
      const localDay = local[date] || {};
      const remoteDay = remote[date] || {};
      const allTypes = new Set([...Object.keys(localDay), ...Object.keys(remoteDay)]);
      allTypes.forEach(type=>{
        const localArr = Array.isArray(localDay[type]) ? localDay[type] : (localDay[type] ? [localDay[type]] : []);
        const remoteArr = remoteDay[type] || [];
        const maxLen = Math.max(localArr.length, remoteArr.length);
        const merged = [];
        for(let i=0;i<maxLen;i++){
          const L = localArr[i], R = remoteArr[i];
          if(L && R){
            // 合併 orders
            const lo = L.orders||[], ro = R.orders||[];
            const seen = new Set();
            const mergedOrders = [];
            ro.forEach(o=>{ const k=(o.name||'')+'|'+(o.ts||''); seen.add(k); mergedOrders.push(o); });
            lo.forEach(o=>{ const k=(o.name||'')+'|'+(o.ts||''); if(!seen.has(k)) mergedOrders.push(o); });
            merged.push({...R, orders: mergedOrders});
          } else if(R){
            merged.push(R);
          } else if(L){
            merged.push(L);
          }
        }
        if(merged.length) out[date][type] = merged;
      });
      if(!Object.keys(out[date]).length) delete out[date];
    });
    S.groups = out;
    saveG();
    rerenderCurrentScreen();
  }catch(e){ console.warn('syncGAS failed:', e.message); }
}

// ── 判斷目前在哪個畫面,呼叫對應 render 函式 ──
function rerenderCurrentScreen(){
  const active = document.querySelector('.scr.on');
  if(!active) return;
  const id = active.id;
  try{
    if(id==='s-land') renderGrid();
    else if(id==='s-day') { if(typeof renderDay==='function') renderDay(); }
    else if(id==='s-group'){
      // 訂單清單畫面 — 同步團組資料後重新渲染
      if(S.curGroup && S.selDate && S.type){
        const grps = S.groups[S.selDate]?.[S.type];
        if(Array.isArray(grps) && grps[S.curGroupIdx]){
          S.curGroup = grps[S.curGroupIdx];
          if(typeof renderGroupDetail==='function') renderGroupDetail();
        }
      }
    }
    // 其他畫面 (點餐中、完成頁) 不自動重繪避免干擾輸入
  }catch(e){ console.warn('rerender failed:', e.message); }
}

// ── 自動輪詢:每 8 秒拉一次遠端資料 (只有 tab 可見時) ──
let _syncTimer = null;
function startSyncPolling(){
  if(_syncTimer) clearInterval(_syncTimer);
  _syncTimer = setInterval(()=>{
    if(document.visibilityState==='visible' && GAS_URL){
      syncGAS();
    }
  }, 8000);
}
document.addEventListener('visibilitychange', ()=>{
  // 回到 tab 時立刻同步一次
  if(document.visibilityState==='visible' && GAS_URL) syncGAS();
});

  const orders = grp.orders||[];
  const total = orders.reduce((s,o)=>s+(o.total||0),0);

  const ts = new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});

  const addr = grp.shopAddr || '';

    const pmIco = o.paidMethod==='linepay'?'💚 LINE Pay':o.paidMethod==='ipass'?'💳 iPass Money':o.paidMethod==='cash'?'💵 現金':'—';

  html += '<td style="padding:7px 10px;border:1px solid #ddd;font-weight:700">電話</td><td style="padding:7px 10px;border:1px solid #ddd">' + (tel ? '<a href="tel:' + tel.replace(/-/g,'') + '" style="color:#15803d;text-decoration:none;font-weight:700">📞 ' + tel + '</a>' : '—') + '</td></tr>';
  html += '<tr style="background:#f5f5f5"><td style="padding:7px 10px;border:1px solid #ddd;font-weight:700">日期</td><td colspan="3" style="padding:7px 10px;border:1px solid #ddd">' + S.selDate + '</td></tr>';
  if(grp.announcement) html += '<tr><td colspan="4" style="padding:7px 10px;border:1px solid #ddd"><b>📢</b> ' + grp.announcement + '</td></tr>';
  html += '</table>';

  // 品項合併統計表（給團主一次跟店家點）
  html += '<div style="font-size:.88rem;font-weight:700;margin-bottom:8px;border-left:4px solid #ee7000;padding-left:10px">📞 跟店家點餐用（合併統計，共 ' + totalQty + ' 杯/份）</div>';
  html += '<table style="width:100%;border-collapse:collapse;margin-bottom:20px;font-size:.86rem">';
  html += '<thead><tr style="background:#ee7000;color:#fff"><th style="padding:9px 12px;border:1px solid #c75800;text-align:left">品項</th><th style="padding:9px 12px;border:1px solid #c75800;text-align:center;width:80px">數量</th><th style="padding:9px 12px;border:1px solid #c75800;text-align:right;width:110px">小計</th></tr></thead>';
  html += '<tbody>' + aggRows + '</tbody>';
  html += '<tfoot><tr style="background:#fff7ed;font-weight:900"><td style="padding:9px 12px;border:1px solid #ddd">合計</td><td style="padding:9px 12px;border:1px solid #ddd;text-align:center">×' + totalQty + '</td><td style="padding:9px 12px;border:1px solid #ddd;text-align:right;color:#dc2626">NT$' + total + '</td></tr></tfoot></table>';

  // Orders table — 姓名 / 品項 / 付款方式 / 總金額
  html += '<div style="font-size:.88rem;font-weight:700;margin-bottom:8px;border-left:4px solid #1a1714;padding-left:10px">👥 個人訂單明細（共 ' + orders.length + ' 人）</div>';
  html += '<table style="width:100%;border-collapse:collapse;margin-bottom:20px;font-size:.86rem">';
  html += '<thead><tr style="background:#1a1714;color:#fbbf24"><th style="padding:9px 12px;border:1px solid #333;text-align:left;width:80px">姓名</th><th style="padding:9px 12px;border:1px solid #333;text-align:left">品項</th><th style="padding:9px 12px;border:1px solid #333;text-align:center;width:110px">付款方式</th><th style="padding:9px 12px;border:1px solid #333;text-align:right;width:90px">小計</th></tr></thead>';
  html += '<tbody>' + orderRows + '</tbody>';
  html += '<tfoot><tr style="background:#f5f5f5;font-weight:900"><td style="padding:9px 12px;border:1px solid #ddd">合計</td><td style="padding:9px 12px;border:1px solid #ddd;text-align:right;font-size:.78rem">已收 NT$' + paidAmt + '</td><td style="padding:9px 12px;border:1px solid #ddd"></td><td style="padding:9px 12px;border:1px solid #ddd;text-align:right;color:#dc2626;font-size:1rem">NT$' + total + '</td></tr></tfoot></table>';

  html += '<div style="text-align:center;font-size:.7rem;color:#999;border-top:1px solid #eee;padding-top:10px">EMBA E118 共學團點餐系統　' + ts + '</div>';
  html += '</div></div>';

  // Add print CSS
  html += '<style>@media print{.no-print{display:none!important} body{margin:0} #pdfview{position:static!important;overflow:visible!important}}</style>';

  // Inject directly into body
  const existing = document.getElementById('pdfview');
  if(existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  window.scrollTo(0,0);
}

// 直接下載 PDF（使用 html2pdf.js）
function doDownloadPDF(){
  const el = document.getElementById('pdfview');
  if(!el){ toast('找不到訂單內容'); return; }
  if(typeof html2pdf === 'undefined'){ toast('PDF 套件載入中，請稍候再試'); return; }
  const grp = S.curGroup;
  const fname = 'EMBA-E118-'+(S.type==='drink'?'飲料':'便當')+'-'+S.selDate+'-'+(grp?.shopName||'訂單')+'.pdf';
  const content = document.getElementById('pdfview-content');
  if(!content){ toast('找不到訂單內容'); return; }
  toast('⏳ 產生 PDF 中…');
  // 把 content clone 到一個固定寬度的離屏容器，避免 fixed/overflow 影響 html2canvas
  const clone = content.cloneNode(true);
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;left:-99999px;top:0;width:780px;background:#fff;color:#111;font-family:\'Noto Sans TC\',sans-serif;padding:0';
  wrap.appendChild(clone);
  document.body.appendChild(wrap);
  html2pdf().set({
    margin: [10,10,10,10],
    filename: fname,
    image: { type:'jpeg', quality:0.98 },
    html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff', windowWidth:800, letterRendering:true },
    jsPDF: { unit:'mm', format:'a4', orientation:'portrait', compress:true },
    pagebreak: { mode:['avoid-all','css','legacy'] }
  }).from(clone).save().then(()=>{
    toast('✅ PDF 已下載');
    wrap.remove();
  }).catch(e=>{
    console.error(e);
    toast('❌ 產生失敗，請改用截圖');
    wrap.remove();
  });
}


// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function go(name){
  const ids={'land':'s-land','day':'s-day','shop':'s-shop','presets':'s-presets','s-presets':'s-presets','setup':'s-setup','order':'s-order','confirm':'s-confirm','done':'s-done','group':'s-group','s-group':'s-group'};
  const target=ids[name]||name;
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(target)?.classList.add('on');
  window.scrollTo(0,0);
}

// TOAST
// ═══════════════════════════════════════════════
let _tt;
function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('on'),2600); }

init();
